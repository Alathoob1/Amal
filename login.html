<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aura</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            max-width: 420px;
            margin: 8vh auto;
        }
        .role-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        .role-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-sm);
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            font-weight: 500;
            color: var(--color-text-muted);
            transition: all 0.3s;
        }
        .role-btn.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
            box-shadow: 0 4px 10px rgba(117, 154, 114, 0.2);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-primary);"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="m9 12 2 2 4-4"></path></svg>
            Aura
        </a>
        <div class="navbar-links">
            <a href="index.html" data-i18n="nav_home">Home</a>
            <button id="langToggle" class="btn btn-outline" style="padding: 4px 12px; margin-inline-start: 16px;">EN / AR</button>
        </div>
    </nav>

    <div class="container">
        <div class="card login-container">
            <h2 class="text-center" style="color: var(--color-primary); margin-bottom: 24px; font-size: 1.8rem;" data-i18n="login_title">Welcome Back</h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" data-i18n="login_email">Email Address</label>
                    <input type="email" id="emailInput" class="form-control" required placeholder="name@example.com">
                </div>
                
                <div class="form-group" style="margin-bottom: 32px;">
                    <label class="form-label" data-i18n="login_password">Password</label>
                    <input type="password" id="passwordInput" class="form-control" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 12px;" data-i18n="btn_login_submit">Sign In</button>
            </form>
            
            <div class="text-center mt-2">
                <a href="#" style="color: var(--color-text-muted); font-size: 0.9rem; text-decoration: none;" data-i18n="login_forgot">Forgot password?</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const submitBtn = loginForm.querySelector('button[type="submit"]');

            // Insert alert div before form
            const alertDiv = document.createElement('div');
            alertDiv.style.display = 'none';
            alertDiv.style.padding = '10px 14px';
            alertDiv.style.borderRadius = '8px';
            alertDiv.style.marginBottom = '16px';
            alertDiv.style.fontSize = '0.9rem';
            loginForm.parentNode.insertBefore(alertDiv, loginForm);

            function showAlert(message, type = 'error') {
                alertDiv.style.display = 'block';
                alertDiv.textContent = message;
                alertDiv.style.backgroundColor = type === 'error' ? 'rgba(239,68,68,0.1)' : 'rgba(117,154,114,0.1)';
                alertDiv.style.color = type === 'error' ? '#DC2626' : '#759A72';
                alertDiv.style.border = `1px solid ${type === 'error' ? 'rgba(239,68,68,0.2)' : 'rgba(117,154,114,0.2)'}`;
            }

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('emailInput').value.trim();
                const password = document.getElementById('passwordInput').value;
                
                submitBtn.disabled = true;
                const originalText = submitBtn.textContent;
                submitBtn.textContent = 'جاري التحقق... / Checking...';

                try {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        showAlert('تم تسجيل الدخول بنجاح! / Login successful!', 'success');
                        setTimeout(() => {
                            if (data.role === 'admin') window.location.href = 'admin.html';
                            else if (data.role === 'doctor') window.location.href = 'doctor.html';
                            else window.location.href = 'parent.html';
                        }, 1000);
                    } else {
                        showAlert(data.message || 'فشل تسجيل الدخول / Login failed');
                        submitBtn.disabled = false;
                        submitBtn.textContent = originalText;
                    }
                } catch (error) {
                    showAlert('حدث خطأ في الاتصال بالخادم / Connection error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            });
        });
    </script>
</body>
</html>
